<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cip 출결 관리 Pro</title>
    <style>
        :root {
            --ios-bg: #050505;
            --ios-card: rgba(30, 30, 30, 0.6);
            --ios-card-absent: rgba(255, 59, 48, 0.15);
            --ios-border-light: rgba(255, 255, 255, 0.15);
            --ios-border-dark: rgba(0, 0, 0, 0.8);
            --ios-border-absent: rgba(255, 59, 48, 0.5);
            --ios-green: #30D158;
            --ios-red: #FF453A;
            --ios-blue: #0A84FF;
            --ios-orange: #FF9F0A;
            --text-main: #F5F5F7;
            --text-sub: #EBEBF5A6; 
            --easing-apple: cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        body {
            margin: 0; padding: 25px 25px 80px 25px; 
            background-color: var(--ios-bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            font-size: 16px;
            min-height: 100vh;
        }
        
        .bg-aurora {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none; overflow: hidden;
        }
        .bg-aurora::before, .bg-aurora::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            filter: blur(90px);
        }
        .bg-aurora::before {
            background: radial-gradient(circle at 20% 30%, rgba(10, 132, 255, 0.15), transparent 40%);
            animation: drift1 20s infinite alternate var(--easing-apple);
        }
        .bg-aurora::after {
            background: radial-gradient(circle at 80% 80%, rgba(48, 209, 88, 0.1), transparent 40%);
            animation: drift2 25s infinite alternate var(--easing-apple);
        }
        @keyframes drift1 { 0% { transform: translate(0, 0); } 100% { transform: translate(10vw, 15vh); } }
        @keyframes drift2 { 0% { transform: translate(0, 0); } 100% { transform: translate(-10vw, -15vh); } }

        .header {
            position: sticky; top: 0; 
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: saturate(200%) blur(30px);
            -webkit-backdrop-filter: saturate(200%) blur(30px);
            padding: 20px 30px; 
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 20px;
            border-radius: 20px; margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideDown 0.8s var(--easing-apple) backwards;
        }
        
        .header-left { display: flex; flex-direction: column; gap: 6px; }
        .header h2 { margin: 0; font-size: 1.2rem; font-weight: 700; color: var(--ios-blue); letter-spacing: -0.5px; text-transform: uppercase;}
        
        /* 초 부분 정렬을 위해 baseline에서 center로 변경 */
        .current-time { 
            font-size: 1.8rem; color: #fff; font-weight: 700; letter-spacing: 0.5px;
            text-shadow: 0 2px 15px rgba(255, 255, 255, 0.25);
            display: flex; align-items: center; gap: 4px;
        }
        .time-date { font-size: 1.1rem; color: var(--text-sub); font-weight: 500; margin-right: 10px; }
        .time-colon { animation: pulse 1s infinite; }
        
        /* vertical-align 제거 및 고정 높이 지정 */
        .sec-box { display: inline-block; position: relative; width: 32px; text-align: center; overflow: hidden; height: 1.8rem; }
        /* top, height, line-height 조정을 통해 상하 텍스트 정렬 정밀 교정 */
        .sec-text { position: absolute; left: 0; top: 0; width: 100%; height: 100%; line-height: 1.8rem; transition: transform 0.3s var(--easing-apple), opacity 0.3s var(--easing-apple); }
        .sec-text.out-up { transform: translateY(-100%); opacity: 0; }
        .sec-text.in-up { transform: translateY(100%); opacity: 0; }
        .sec-text.active { transform: translateY(0); opacity: 1; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes slideDown { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .stats { 
            font-weight: 600; font-size: 1.15rem; 
            background: linear-gradient(145deg, rgba(40,40,40,0.6), rgba(10,10,10,0.8));
            padding: 12px 24px; border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 4px 15px rgba(0,0,0,0.3);
        }
        .stats span { margin-left: 15px; }
        .text-green { color: var(--ios-green); text-shadow: 0 0 10px rgba(48,209,88,0.3);}
        .text-red { color: var(--ios-red); text-shadow: 0 0 10px rgba(255,69,58,0.3);}
        
        .timetable {
            background: linear-gradient(145deg, rgba(30, 30, 30, 0.5), rgba(10, 10, 10, 0.6));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 14px 20px;
            display: flex; flex-direction: column; gap: 8px;
            min-width: 200px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 5px 20px rgba(0,0,0,0.4);
        }
        .tt-row { display: flex; justify-content: space-between; gap: 20px; font-size: 0.95rem; }
        .tt-label { font-weight: 700; color: var(--ios-orange); }
        .tt-time { color: var(--text-main); font-weight: 600; font-variant-numeric: tabular-nums; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: linear-gradient(180deg, rgba(45, 45, 45, 0.7) 0%, rgba(25, 25, 25, 0.7) 100%);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid rgba(0, 0, 0, 0.8);
            border-radius: 22px; 
            padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
            transition: all 0.4s var(--easing-apple);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            opacity: 0; transform: translateY(20px);
            animation: cardFadeUp 0.6s var(--easing-apple) forwards;
        }
        
        .card:hover {
            transform: translateY(-4px) scale(1.01) !important;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            background: linear-gradient(180deg, rgba(55, 55, 55, 0.75) 0%, rgba(30, 30, 30, 0.75) 100%);
        }

        .card.is-absent {
            background: linear-gradient(180deg, rgba(60, 20, 20, 0.6) 0%, rgba(30, 10, 10, 0.6) 100%);
            border-top: 1px solid rgba(255, 59, 48, 0.4);
            box-shadow: 0 10px 30px rgba(255, 59, 48, 0.15);
        }
        
        @keyframes cardFadeUp { to { opacity: 1; transform: translateY(0); } }

        .card-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .info { flex: 1; display: flex; align-items: baseline; }
        .info .id { color: var(--text-sub); font-size: 0.95rem; margin-right: 8px; font-weight: 600;}
        .info .name { font-weight: 700; font-size: 1.4rem; letter-spacing: -0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); white-space: nowrap;}
        
        .btn-group { 
            display: flex; border-radius: 10px; overflow: hidden; 
            background: rgba(0, 0, 0, 0.6); width: 130px; padding: 3px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            flex-shrink: 0;
            position: relative;
        }
        .btn-group .btn { 
            flex: 1; padding: 8px 0; font-size: 0.95rem; font-weight: 700; background: transparent; 
            color: var(--text-sub); transition: all 0.3s var(--easing-apple); border-radius: 8px;
            z-index: 2; cursor: pointer; border: none; font-family: inherit;
        }
        
        .card.is-present .btn-present { 
            background: var(--ios-green); color: #fff; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3); 
        }
        .card.is-absent .btn-absent { 
            background: var(--ios-red); color: #fff; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .input-group { display: flex; gap: 10px; transition: all 0.3s var(--easing-apple); }
        .input-item {
            width: 100%; padding: 10px 14px; border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3); color: #fff; 
            font-size: 0.95rem; box-sizing: border-box; font-family: inherit; font-weight: 500;
            transition: all 0.3s var(--easing-apple);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
            height: 42px; 
        }
        .input-item:focus { 
            outline: none; border-color: var(--ios-blue); 
            background: rgba(10, 132, 255, 0.1); 
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2), inset 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .hidden-animated {
            opacity: 0 !important;
            width: 0 !important;
            padding-left: 0 !important;
            padding-right: 0 !important;
            border-width: 0 !important;
            margin: 0 !important;
            overflow: hidden !important;
            pointer-events: none;
        }

        select.input-item { 
            appearance: none; -webkit-appearance: none; 
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); 
            background-repeat: no-repeat; background-position: right 14px top 50%; background-size: 10px auto; padding-right: 30px; cursor: pointer;
        }
        select option { background: #1c1c1e; color: #fff; }
    </style>
</head>
<body>

<div class="bg-aurora"></div>

<div class="header">
    <div class="header-left">
        <h2>Cip Management Pro</h2>
        <div id="real-time-clock" class="current-time">
            <span class="time-date" id="t-date"></span>
            <span id="t-ampm" style="font-size:1.2rem; margin-right:4px;"></span>
            <span id="t-hm"></span><span class="time-colon">:</span>
            <div class="sec-box">
                <div id="t-sec-old" class="sec-text out-up">00</div>
                <div id="t-sec-new" class="sec-text active">00</div>
            </div>
        </div>
    </div>
    
    <div class="stats">
        총 <span id="cnt-total">0</span>명 
        <span class="text-green">참여 <span id="cnt-present">0</span></span>
        <span class="text-red">미참여 <span id="cnt-absent">0</span></span>
    </div>

    <div class="timetable">
        <div class="tt-row"><span class="tt-label">Cip 1차</span> <span class="tt-time">4:30 ~ 5:40</span></div>
        <div class="tt-row"><span class="tt-label">Cip 2차</span> <span class="tt-time">6:40 ~ 8:00</span></div>
        <div class="tt-row"><span class="tt-label">Cip 3차</span> <span class="tt-time">8:10 ~ 9:00</span></div>
        <div class="tt-row"><span class="tt-label">저특공</span> <span class="tt-time">9:00 ~ 10:00</span></div>
    </div>
</div>

<div class="grid-container" id="list"></div>

<script>
    let currentSecond = -1;
    function updateClock() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const daysOfWeek = ['일', '월', '화', '수', '목', '금', '토'];
        const dayOfWeek = daysOfWeek[now.getDay()];

        let hours = now.getHours();
        const ampm = hours >= 12 ? '오후' : '오전';
        hours = hours % 12; hours = hours ? hours : 12; 
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');

        document.getElementById('t-date').innerText = `${year}년 ${month}월 ${day}일 (${dayOfWeek})`;
        document.getElementById('t-ampm').innerText = ampm;
        document.getElementById('t-hm').innerText = `${hours}:${minutes}`;

        if (currentSecond !== seconds) {
            const elOld = document.getElementById('t-sec-old');
            const elNew = document.getElementById('t-sec-new');
            
            elOld.innerText = currentSecond === -1 ? seconds : String(currentSecond).padStart(2, '0');
            elOld.className = 'sec-text active';
            
            elNew.innerText = seconds;
            elNew.className = 'sec-text in-up';
            
            setTimeout(() => {
                elOld.className = 'sec-text out-up';
                elNew.className = 'sec-text active';
            }, 20);

            currentSecond = seconds;
        }
    }
    updateClock();
    setInterval(updateClock, 1000);

    const students = [
        { id: "10801", name: "곽승찬" }, { id: "10802", name: "권용우" },
        { id: "10803", name: "권혁준" }, { id: "10804", name: "김동언" },
        { id: "10805", name: "김동욱" }, { id: "10806", name: "김명찬" },
        { id: "10807", name: "김민재" }, { id: "10808", name: "김성수" },
        { id: "10809", name: "남현승" }, { id: "10810", name: "노진유" },
        { id: "10811", name: "박유찬" }, { id: "10813", name: "송민재" },
        { id: "10814", name: "신민호" }, { id: "10815", name: "연윤" },
        { id: "10816", name: "오영준" }, { id: "10817", name: "오준혁" },
        { id: "10818", name: "유태경" }, { id: "10819", name: "이기용" },
        { id: "10820", name: "이시온" }, { id: "10821", name: "이예준" },
        { id: "10822", name: "이정우" }, { id: "10823", name: "이주호" },
        { id: "10824", name: "이지원" }, { id: "10825", name: "이창근" },
        { id: "10826", name: "임강현" }, { id: "10827", name: "전승훈" },
        { id: "10828", name: "정민재" }, { id: "10829", name: "정시우" },
        { id: "10830", name: "정태진" }, { id: "10831", name: "조성빈" },
        { id: "10832", name: "최희찬" }, { id: "10833", name: "한경민" },
        { id: "10835", name: "홍산들" }, { id: "10836", name: "이준우" }
    ];

    const listDiv = document.getElementById('list');

    students.forEach((st, index) => {
        const card = document.createElement('div');
        card.className = 'card is-present';
        card.id = `card-${st.id}`;
        card.style.animationDelay = `${index * 0.03}s`;

        card.innerHTML = `
            <div class="card-top">
                <div class="info">
                    <span class="id">${st.id}</span>
                    <span class="name">${st.name}</span>
                </div>
                <div class="btn-group">
                    <button class="btn btn-present" onclick="setStatus('${st.id}', 'present')">참여</button>
                    <button class="btn btn-absent" onclick="setStatus('${st.id}', 'absent')">미참</button>
                </div>
            </div>
            
            <div class="input-group">
                <select id="loc-select-${st.id}" class="input-item" onchange="checkLocation('${st.id}')">
                    <option value="교실" selected>📍 교실</option>
                    <option value="프로젝트실">📍 프로젝트실</option>
                    <option value="직접입력">📍 직접 입력</option>
                </select>
                <input type="text" id="loc-custom-${st.id}" class="input-item hidden-animated" placeholder="위치 입력">
                
                <select id="reason-${st.id}" class="input-item hidden-animated" onchange="checkReason('${st.id}')">
                    <option value="학원">학원</option>
                    <option value="동아리">동아리</option>
                    <option value="기타">기타(직접)</option>
                </select>
                <input type="text" id="custom-${st.id}" class="input-item hidden-animated" placeholder="📝 사유 입력">
            </div>
        `;
        listDiv.appendChild(card);
    });

    function setStatus(id, status) {
        const card = document.getElementById(`card-${id}`);
        const locSelect = document.getElementById(`loc-select-${id}`);
        const locCustom = document.getElementById(`loc-custom-${id}`);
        const reasonSelect = document.getElementById(`reason-${id}`);
        const customInput = document.getElementById(`custom-${id}`);

        if (status === 'present') {
            card.classList.add('is-present');
            card.classList.remove('is-absent');
            
            locSelect.classList.remove('hidden-animated');
            if(locSelect.value === '직접입력') locCustom.classList.remove('hidden-animated');
            
            reasonSelect.classList.add('hidden-animated');
            customInput.classList.add('hidden-animated');
            
            locSelect.style.width = locSelect.value === '직접입력' ? '40%' : '100%';
        } else {
            card.classList.remove('is-present');
            card.classList.add('is-absent');
            
            locSelect.classList.add('hidden-animated');
            locCustom.classList.add('hidden-animated');
            
            reasonSelect.classList.remove('hidden-animated');
            if (reasonSelect.value === '기타') {
                customInput.classList.remove('hidden-animated');
            }
            reasonSelect.style.width = reasonSelect.value === '기타' ? '40%' : '100%';
        }
        updateCounts();
    }

    function checkLocation(id) {
        const locSelect = document.getElementById(`loc-select-${id}`);
        const locCustom = document.getElementById(`loc-custom-${id}`);
        if (locSelect.value === '직접입력') {
            locSelect.style.width = '40%';
            locCustom.classList.remove('hidden-animated');
            locCustom.style.width = '60%';
            setTimeout(() => locCustom.focus(), 100);
        } else {
            locSelect.style.width = '100%';
            locCustom.classList.add('hidden-animated');
            locCustom.style.width = '0';
        }
    }

    function checkReason(id) {
        const reasonSelect = document.getElementById(`reason-${id}`);
        const customInput = document.getElementById(`custom-${id}`);
        if (reasonSelect.value === '기타') {
            reasonSelect.style.width = '40%';
            customInput.classList.remove('hidden-animated');
            customInput.style.width = '60%';
            setTimeout(() => customInput.focus(), 100);
        } else {
            reasonSelect.style.width = '100%';
            customInput.classList.add('hidden-animated');
            customInput.style.width = '0';
        }
    }

    function updateCounts() {
        const total = students.length;
        const absent = document.querySelectorAll('.card.is-absent').length;
        const present = total - absent;

        document.getElementById('cnt-total').innerText = total;
        document.getElementById('cnt-present').innerText = present;
        document.getElementById('cnt-absent').innerText = absent;
    }

    updateCounts();
</script>

</body>
</html>
